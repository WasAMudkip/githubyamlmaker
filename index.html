<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub YAML Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="gh-header">
            <div class="header-brand">
                <svg height="32" viewBox="0 0 16 16" width="32" fill="white"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
                <h1>GitHub YAML Builder</h1>
            </div>
            <select id="yaml-type" class="gh-select">
                <option value="none">Select Type...</option>
                <option value="workflow">Actions Workflow</option>
                <option value="issue-form">Issue Form</option>
            </select>
        </header>

        <main class="gh-grid">
            <section id="gui-interface" class="gh-card">
                <div class="blankslate">
                    <h3>No template selected</h3>
                    <p>Choose a type from the dropdown to begin.</p>
                </div>
            </section>

            <section id="output-interface" class="gh-card">
                <div class="card-header">
                    <span class="tab-label">YAML Preview</span>
                    <div class="header-actions">
                        <button id="copy-btn" class="gh-btn">Copy</button>
                        <button id="download-btn" class="gh-btn gh-btn-primary">Download</button>
                    </div>
                </div>
                <div class="code-area">
                    <pre id="yaml-preview"># Select a type to see output</pre>
                </div>
                <div class="help-footer">
                    <strong>Target:</strong> <span id="help-text">---</span>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
